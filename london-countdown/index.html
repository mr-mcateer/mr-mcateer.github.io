<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>London. May 24, 2026.</title>
  <meta name="description" content="A countdown to London. Wheels up Sunday, May 24, 2026 at 5:30 PM Mountain.">
  <meta name="theme-color" content="#0b0d10" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f6f3ee" media="(prefers-color-scheme: light)">

  <meta property="og:type" content="website">
  <meta property="og:title" content="London. May 24, 2026.">
  <meta property="og:description" content="A countdown to London.">
  <meta property="og:url" content="https://promptaisolutions.com/london-countdown/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="London. May 24, 2026.">
  <meta name="twitter:description" content="A countdown to London.">

  <link rel="canonical" href="https://promptaisolutions.com/london-countdown/">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%2064%2064'%3E%3Crect%20width%3D'64'%20height%3D'64'%20rx%3D'12'%20fill%3D'%230b0d10'%2F%3E%3Ctext%20x%3D'32'%20y%3D'46'%20font-family%3D'Georgia%2Cserif'%20font-size%3D'42'%20font-style%3D'italic'%20fill%3D'%23c8a96a'%20text-anchor%3D'middle'%3EL%3C%2Ftext%3E%3C%2Fsvg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..600&family=Inter:wght@400;500&display=swap">

  <style>
    :root {
      --bg: #0b0d10;
      --ink: #f6f3ee;
      --ink-muted: #9aa0a8;
      --rule: #23272e;
      --accent: #c8a96a;
      --serif: "Fraunces", "Iowan Old Style", Georgia, serif;
      --sans: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --pad: clamp(1.25rem, 5vw, 3rem);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f3ee;
        --ink: #14171c;
        --ink-muted: #5a6068;
        --rule: #d9d3c6;
        --accent: #8a6a2a;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        transition-duration: .001ms !important;
      }
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: grid;
      place-items: center;
      padding: var(--pad);
    }

    .card {
      width: 100%;
      max-width: 720px;
      text-align: center;
    }

    .kicker {
      font-size: .75rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 1rem;
    }

    .headline {
      font-family: var(--serif);
      font-weight: 350;
      font-size: clamp(3.5rem, 16vw, 8rem);
      line-height: .95;
      letter-spacing: -.025em;
      margin: 0;
    }
    .headline em {
      font-style: italic;
      color: var(--accent);
    }

    .date {
      margin: .75rem 0 0;
      font-size: clamp(.95rem, 2.4vw, 1.1rem);
      color: var(--ink-muted);
      letter-spacing: .02em;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(.5rem, 2vw, 1.5rem);
      margin: clamp(2.5rem, 7vw, 4rem) 0 clamp(1.5rem, 4vw, 2rem);
      padding: clamp(1.25rem, 3vw, 1.75rem) 0;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }

    .unit { display: grid; gap: .4rem; }

    .num {
      font-family: var(--sans);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      font-size: clamp(2.25rem, 9vw, 5rem);
      line-height: 1;
      letter-spacing: -.04em;
      color: var(--ink);
    }

    .label {
      font-size: .65rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .note {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(.95rem, 2.2vw, 1.1rem);
      line-height: 1.5;
      color: var(--ink-muted);
      max-width: 36ch;
      margin: 0 auto;
    }
    .note strong {
      font-style: normal;
      font-weight: 500;
      color: var(--ink);
    }

    .departed .countdown { opacity: .55; }
    .departed .headline em::after { content: " *"; color: var(--accent); }

    @media (max-width: 380px) {
      .num { letter-spacing: -.05em; }
      .countdown { gap: .35rem; }
    }
  </style>
</head>
<body>

  <main class="card">
    <p class="kicker">Departure</p>
    <h1 class="headline">London. <em>May&nbsp;24.</em></h1>
    <p class="date">Sunday, May 24, 2026 &middot; 5:30&nbsp;PM Mountain</p>

    <section class="countdown" aria-label="Time until departure">
      <div class="unit"><span class="num" id="d">00</span><span class="label">Days</span></div>
      <div class="unit"><span class="num" id="h">00</span><span class="label">Hours</span></div>
      <div class="unit"><span class="num" id="m">00</span><span class="label">Minutes</span></div>
      <div class="unit"><span class="num" id="s">00</span><span class="label">Seconds</span></div>
    </section>

    <p class="note">
      Wheels up at <strong>Salt Lake</strong>. Wheels down at <strong>Heathrow</strong> the next morning.
    </p>

    <time id="dep" datetime="2026-05-24T17:30:00-06:00" hidden></time>
  </main>

  <script>
    (function () {
      "use strict";
      var DEPARTURE = new Date(document.getElementById("dep").getAttribute("datetime"));
      if (isNaN(DEPARTURE)) { console.error("[countdown] bad datetime"); return; }

      var $d = document.getElementById("d");
      var $h = document.getElementById("h");
      var $m = document.getElementById("m");
      var $s = document.getElementById("s");

      function pad(n, w) { return String(Math.max(0, n | 0)).padStart(w || 2, "0"); }

      function tick() {
        var ms = DEPARTURE.getTime() - Date.now();
        if (ms <= 0) {
          $d.textContent = "00"; $h.textContent = "00";
          $m.textContent = "00"; $s.textContent = "00";
          document.body.classList.add("departed");
          return;
        }
        var d = Math.floor(ms / 86400000);
        var h = Math.floor((ms % 86400000) / 3600000);
        var m = Math.floor((ms % 3600000) / 60000);
        var s = Math.floor((ms % 60000) / 1000);
        $d.textContent = pad(d, d > 99 ? 3 : 2);
        $h.textContent = pad(h);
        $m.textContent = pad(m);
        $s.textContent = pad(s);
      }

      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
