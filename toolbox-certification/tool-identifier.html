<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Tool Identifier - What Is This Thing?</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card-bg: #fff;
      --text: #1a1a2e;
      --accent: #c0392b;
      --border: #ddd;
      --muted: #666;
      --green: #2e7d32;
      --blue: #1565c0;
      --orange: #e65100;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { background: #fff; color-scheme: light; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-text-size-adjust: 100%;
    }
    .header {
      background: var(--accent);
      color: white;
      padding: 1rem 1rem;
      text-align: center;
    }
    .header h1 { font-size: 1.3rem; margin-bottom: 0.1rem; }
    .header p { opacity: 0.9; font-size: 0.85rem; }
    .nav-back {
      display: inline-block;
      padding: 0.5rem 1rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
    }
    .nav-back:hover { text-decoration: underline; }
    .container { max-width: 700px; margin: 0 auto; padding: 0 0.75rem 2rem; }

    /* --- SEARCH (sticky, mobile-friendly) --- */
    .search-wrap {
      position: sticky;
      top: 0;
      background: var(--bg);
      padding: 0.75rem 0 0.5rem;
      z-index: 10;
    }
    .search-inner { position: relative; }
    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
      pointer-events: none;
    }
    .search-box {
      width: 100%;
      padding: 0.7rem 0.75rem 0.7rem 2.25rem;
      font-size: 16px; /* prevents iOS zoom */
      border: 2px solid var(--border);
      border-radius: 8px;
      outline: none;
      background: var(--card-bg);
      -webkit-appearance: none;
      appearance: none;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }

    /* --- FILTER CHIPS --- */
    .filters {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
      -webkit-overflow-scrolling: touch;
    }
    .filter-btn {
      padding: 0.4rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card-bg);
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .filter-btn:hover, .filter-btn:active { border-color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .result-count { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; }

    /* --- TOOL CARDS --- */
    .tool-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.6rem;
      overflow: hidden;
    }
    .tool-card.required { border-left: 4px solid var(--green); }
    .tool-card.mystery { border-left: 4px solid var(--orange); }
    .tool-card.precision { border-left: 4px solid var(--blue); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .card-icon {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      background: #f0f0f0;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-icon svg {
      width: 40px;
      height: 40px;
    }
    .card-title-area { flex: 1; min-width: 0; }
    .card-title-area h3 { font-size: 0.95rem; line-height: 1.3; }
    .badge {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 0.15rem;
    }
    .badge-required { background: #e8f5e9; color: var(--green); }
    .badge-mystery { background: #fff3e0; color: var(--orange); }
    .badge-precision { background: #e3f2fd; color: var(--blue); }
    .expand-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      color: var(--muted);
      transition: transform 0.2s;
    }
    .tool-card.open .expand-icon { transform: rotate(180deg); }

    .card-body {
      display: none;
      padding: 0 0.75rem 0.75rem;
      border-top: 1px solid #eee;
    }
    .tool-card.open .card-body { display: block; }

    .detail-row {
      padding: 0.4rem 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--muted);
      margin-bottom: 0.1rem;
    }
    .detail-value { font-size: 0.88rem; }

    .route-tag {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .route-toolbox { background: #e8f5e9; color: #2e7d32; }
    .route-metals { background: #e8eaf6; color: #283593; }
    .route-vehicle { background: #fce4ec; color: #c62828; }
    .route-shared { background: #e0f2f1; color: #00695c; }
    .route-precision { background: #e3f2fd; color: #1565c0; }
    .route-instructor { background: #f3e5f5; color: #6a1b9a; }
    .route-keep { background: #e0f2f1; color: #00695c; }

    .no-results {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
    }
    .no-results h3 { font-size: 1rem; margin-bottom: 0.3rem; }

    /* --- PRINT --- */
    @media print {
      .search-wrap, .filters, .nav-back, .header, .result-count, .expand-icon { display: none; }
      .card-body { display: block !important; }
      .tool-card { break-inside: avoid; border: 1px solid #999; margin-bottom: 0.3rem; }
    }
  </style>
</head>

// ====== RENDERING ======
const searchInput = document.getElementById('searchInput');
const toolList = document.getElementById('toolList');
const resultCount = document.getElementById('resultCount');
const filterBtns = document.querySelectorAll('.filter-btn');
let activeFilter = 'all';

function renderTools() {
  const query = searchInput.value.toLowerCase().trim();
  const words = query.split(/\s+/).filter(w => w.length > 0);

  let filtered = TOOLS.filter(t => {
    if (activeFilter !== 'all' && t.category !== activeFilter) return false;
    if (words.length === 0) return true;
    const haystack = [t.name, t.looksLike, t.purpose, t.keywords, t.routeLabel, t.drawer || ''].join(' ').toLowerCase();
    return words.every(w => haystack.includes(w));
  });

  resultCount.textContent = filtered.length + ' of ' + TOOLS.length + ' tools';

  if (filtered.length === 0) {
    toolList.innerHTML = '<div class="no-results"><h3>No match</h3><p>Try describing the shape: "star shaped", "rubber hose", "brass rod"</p></div>';
    return;
  }

  toolList.innerHTML = filtered.map((t, i) => {
    const badgeClass = 'badge-' + t.category;
    const badgeText = t.category === 'required' ? 'Required' : t.category === 'mystery' ? 'Mystery' : 'Precision';
    const routeClass = 'route-' + t.route;
    const icon = SVG[t.icon] || SVG.socket;
    const drawerRow = t.drawer ? '<div class="detail-row"><div class="detail-label">Drawer</div><div class="detail-value">' + t.drawer + '</div></div>' : '';
    // Auto-expand first 3 results on search, or mystery tools
    const isOpen = words.length > 0 && i < 3 ? ' open' : '';

    return '<div class="tool-card ' + t.category + isOpen + '" onclick="this.classList.toggle(\'open\')">' +
      '<div class="card-header">' +
        '<div class="card-icon">' + icon + '</div>' +
        '<div class="card-title-area">' +
          '<h3>' + hl(t.name, words) + '</h3>' +
          '<span class="badge ' + badgeClass + '">' + badgeText + '</span>' +
        '</div>' +
        '<svg class="expand-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M5 8l5 5 5-5z"/></svg>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="detail-row"><div class="detail-label">Looks Like</div><div class="detail-value">' + hl(t.looksLike, words) + '</div></div>' +
        '<div class="detail-row"><div class="detail-label">What It Does</div><div class="detail-value">' + hl(t.purpose, words) + '</div></div>' +
        drawerRow +
        '<div class="detail-row"><div class="detail-label">Where It Goes</div><div class="detail-value"><span class="route-tag ' + routeClass + '">' + t.routeLabel + '</span></div></div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function hl(text, words) {
  if (!words.length) return text;
  const esc = words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  return text.replace(new RegExp('(' + esc.join('|') + ')', 'gi'), '<mark>$1</mark>');
}

// ====== EVENTS ======
searchInput.addEventListener('input', renderTools);
filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderTools();
  });
});

renderTools();
</script>
